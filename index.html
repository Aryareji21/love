<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dear Sun</title>

    <meta name="language" content="en-US">
    <meta name="title" content="Dear Sun">
    <meta name="description" content="Collecting this wasn't easy — your star is my motivation to keep going! Contributions are welcome too.">

    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/sun0225SUN/photos/img/20210715233345.png">
    <link rel="stylesheet" href="css/love.css">

    <style>
        body {
            background: white;
            margin: 0;
        }

        /* 💖 Start Screen */
        #startScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            z-index: 1000;
            cursor: pointer;
        }

        /* 💌 Message Style */
        .message {
            position: fixed;
            bottom: 50px;
            width: 100%;
            text-align: center;
            color: #ff4d6d;
            font-size: 30px;

            opacity: 0;
            transform: translateY(30px);
            transition: all 2s ease;

            z-index: 999;
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff99aa;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

<!-- 🖱️ Click to Start -->
<div id="startScreen" onclick="startExperience()">
    Click to Start 💖
</div>

<!-- 🎵 Background Music -->
<audio id="audios" preload="auto" loop>
    <source src="MP3/new.mp3" type="audio/mpeg">
</audio>

<!-- 🎤 Voice Message -->
<audio id="voice" preload="auto">
    <source src="MP3/new.mp3" type="audio/mpeg">
</audio>

<!-- 💖 Heart Animation -->
<div class="container" onselectstart="return false;" unselectable="on" style="-moz-user-select:none;">

    <div class="body_left">
        <img src="images/biubiubiu.gif" alt="" ondragstart='return false;'>
    </div>

    <div class="body_center love">
        <div class="block">
            <div class="div1"></div>
            <div class="div2"></div>
            <div class="div3"></div>
            <div class="div4"></div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <div class="border">
        <div class="border-top"></div>
        <div class="border-bottom"></div>
    </div>
</div>

<!-- 💌 Message -->
<div class="message" id="msg">
    Happy Birthday Oggy 🎉 <br>
    I love you so much ❤️
</div>

<!-- Animation Script -->
<script src="js/love.js"></script>

<!-- 💖 Control Script -->
<script>
function startExperience() {
    // Hide start screen
    document.getElementById("startScreen").style.display = "none";

    // Play background music
    document.getElementById("audios").play();

    // After animation time
    setTimeout(function() {
        // Show message with animation
        document.getElementById("msg").classList.add("show");

        // 🎤 Play voice
        document.getElementById("voice").play();
    }, 20000); // adjust timing if needed
}
</script>

</body>
</html>
